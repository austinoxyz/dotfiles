# ~/.config/alacritty/alacritty.yml

env:
  TERM: xterm-256color

colors:
    primary:
        background: "#323232"
        foreground: "#ffffff"
        bright_background: "#383838"
        bright_foreground: "#ffffff"
        dim_background: "#383838"
        dim_foreground: "#ffffff"
    cursor:
        text: "#282828"
        cursor: "#21d602"

    # gruvbox dark-medium with bright white text
    normal:
        black:   '#bdae93'
        red:     '#9d0006'
        green:   '#79740e'
        yellow:  '#b57614'
        blue:    '#076678'
        magenta: '#8f3f71'
        cyan:    '#427b58'
        white:   '#ffffff'
    bright:
        black:   '#bdae93'
        red:     '#9d0006'
        green:   '#79740e'
        yellow:  '#b57614'
        blue:    '#076678'
        magenta: '#8f3f71'
        cyan:    '#427b58'
        white:   '#ffffff'
    indexed_colors:
      - { index: 16, color: '#af3a03' }
      - { index: 17, color: '#d65d0e' }
      - { index: 18, color: '#ebdbb2' }
      - { index: 19, color: '#d5c4a1' }
      - { index: 20, color: '#665c54' }
      - { index: 21, color: '#3c3836' }

cursor:
    style:
      blinking: Never

font:
    normal:
        family: iosevka term extended
        style: Regular
    bold:
        family: iosevka term extended
        style: Bold
    italic:
        family: iosevka term extended
        style: Italic
    size: 10.0
    ligatures: true
    offset:
        x: 0
        y: 0
    glyph_offset:
        x: 0
        y: 0

window:
    padding:
        x: 2
        y: 2
    history: 10000
    dynamic_title: true
    draw_bold_text_with_bright_colors: true
    semantic_escape_chars: ',│`|:"'' ()[]{}<>'
    save_to_clipboard: true
    live_config_reload: true
    opacity: 0.8  # doesn't work with i3

key_bindings:
  - { key: V, mods: Control|Shift, action: Paste }
  - { key: C, mods: Control|Shift, action: Copy }
  - { key: Key0, mods: Control, action: ResetFontSize }
  - { key: Equals, mods: Control, action: IncreaseFontSize }
  - { key: Minus, mods: Control, action: DecreaseFontSize }
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }

mouse:
    hide_when_typing: true

visual_bell:
  animation: EaseOutExpo
  duration: 1
