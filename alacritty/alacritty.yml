# ~/.config/alacritty/alacritty.yml

env:
  TERM: alacritty-direct

colors:
    primary:
        background: "#181818"
        foreground: "#ffffff"
    cursor:
        text: "#21d602"
        cursor: "#21d602"

    # gruvbox dark-medium with bright white text
    normal:
        black:   '#fbf1c7'
        red:     '#9d0006'
        green:   '#79740e'
        yellow:  '#b57614'
        blue:    '#076678'
        magenta: '#8f3f71'
        cyan:    '#427b58'
        white:   '#ffffff'
    bright:
        black:   '#bdae93'
        red:     '#9d0006'
        green:   '#79740e'
        yellow:  '#b57614'
        blue:    '#076678'
        magenta: '#8f3f71'
        cyan:    '#427b58'
        white:   '#ffffff'
    indexed_colors:
      - { index: 16, color: '#af3a03' }
      - { index: 17, color: '#d65d0e' }
      - { index: 18, color: '#ebdbb2' }
      - { index: 19, color: '#d5c4a1' }
      - { index: 20, color: '#665c54' }
      - { index: 21, color: '#3c3836' }

